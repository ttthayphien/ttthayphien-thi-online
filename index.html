<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TT Thầy Phiên - Thi Online</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
      color: #1f2937;
    }
    header {
      background: #2563eb;
      color: white;
      padding: 24px;
      text-align: center;
    }
    main {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1, h2 {
      margin-top: 0;
    }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px;
      margin: 16px 0;
      background: #fafafa;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #1d4ed8;
    }
    .option {
      display: block;
      margin: 10px 0;
    }
    #result {
      font-weight: bold;
      font-size: 20px;
      color: #16a34a;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>TT Thầy Phiên - Thi Online</h1>
    <p>Website thi trắc nghiệm online cho học sinh</p>
  </header>

  <main>
    <h2>Bài thi thử</h2>
    <p>Học sinh chọn đáp án rồi bấm nộp bài để xem điểm.</p>

    <div class="card">
      <p><b>Câu 1:</b> Kết quả của 2 + 3 là?</p>
      <label class="option"><input type="radio" name="q1" value="A"> A. 4</label>
      <label class="option"><input type="radio" name="q1" value="B"> B. 5</label>
      <label class="option"><input type="radio" name="q1" value="C"> C. 6</label>
      <label class="option"><input type="radio" name="q1" value="D"> D. 7</label>
    </div>

    <div class="card">
      <p><b>Câu 2:</b> Thủ đô của Việt Nam là?</p>
      <label class="option"><input type="radio" name="q2" value="A"> A. TP. Hồ Chí Minh</label>
      <label class="option"><input type="radio" name="q2" value="B"> B. Đà Nẵng</label>
      <label class="option"><input type="radio" name="q2" value="C"> C. Hà Nội</label>
      <label class="option"><input type="radio" name="q2" value="D"> D. Huế</label>
    </div>

    <button onclick="submitExam()">Nộp bài</button>

    <div id="result"></div>
  </main>

  <script>
    function submitExam() {
      let score = 0;

      const q1 = document.querySelector('input[name="q1"]:checked');
      const q2 = document.querySelector('input[name="q2"]:checked');

      if (q1 && q1.value === "B") score++;
      if (q2 && q2.value === "C") score++;

      document.getElementById("result").innerText =
        "Bạn làm đúng " + score + "/2 câu. Điểm: " + (score * 5);
    }
  </script>
</body>
</html>
